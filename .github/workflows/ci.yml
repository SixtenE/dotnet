name: GCP Deployment

on:
  push:
    branches:
      - gcloud

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ws-cicd
      GCP_REGION: europe-north2
      CLOUD_RUN_SERVICE: myapi
      CLOUD_RUN_RUNTIME_SA: myapi-runtime@ws-cicd.iam.gserviceaccount.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          credentials_json: "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}"

      - name: "Set up Cloud SDK"
        uses: "google-github-actions/setup-gcloud@v2"

      - name: Configure gcloud project
        run: gcloud config set project "$GCP_PROJECT_ID"

      - name: Deploy to Cloud Run
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          gcloud run deploy "$CLOUD_RUN_SERVICE" \
            --source . \
            --region "$GCP_REGION" \
            --platform managed \
            --service-account "$CLOUD_RUN_RUNTIME_SA" \
            --set-env-vars "OPENROUTER_API_KEY=$OPENROUTER_API_KEY" \
            --allow-unauthenticated
