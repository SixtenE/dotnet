name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, test]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore DotNet8.ScalarWebApi.sln

      - name: Build
        run: dotnet build DotNet8.ScalarWebApi.sln --configuration Release --no-restore

      - name: Run tests
        run: |
          dotnet test DotNet8.ScalarWebApi.Tests/DotNet8.ScalarWebApi.Tests.csproj \
            --configuration Release \
            --no-build \
            --logger "console;verbosity=normal"
