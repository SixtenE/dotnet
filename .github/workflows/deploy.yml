# Required GitHub secret:
# - GCP_PROJECT_ID
# Authentication options (configure exactly one):
# 1) Workload Identity Federation:
#    - Prefer repository variables: WIF_PROVIDER, WIF_SERVICE_ACCOUNT
#    - Or repository secrets: WIF_PROVIDER, WIF_SERVICE_ACCOUNT
# 2) Service account key JSON:
#    - Repository secret: GCP_CREDENTIALS_JSON
name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: europe-west1
      REPO: my-api
      SERVICE: my-dotnet-api
      WIF_PROVIDER: ${{ vars.WIF_PROVIDER || secrets.WIF_PROVIDER }}
      WIF_SERVICE_ACCOUNT: ${{ vars.WIF_SERVICE_ACCOUNT || secrets.WIF_SERVICE_ACCOUNT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        if: ${{ env.WIF_PROVIDER != '' && env.WIF_SERVICE_ACCOUNT != '' && secrets.GCP_CREDENTIALS_JSON == '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud (JSON key fallback)
        if: ${{ secrets.GCP_CREDENTIALS_JSON != '' && env.WIF_PROVIDER == '' && env.WIF_SERVICE_ACCOUNT == '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Validate auth configuration
        if: ${{ always() }}
        run: |
          WIF_SET="false"
          KEY_SET="false"
          if [[ -n "${WIF_PROVIDER}" && -n "${WIF_SERVICE_ACCOUNT}" ]]; then
            WIF_SET="true"
          fi
          if [[ -n "${{ secrets.GCP_CREDENTIALS_JSON }}" ]]; then
            KEY_SET="true"
          fi

          if [[ "${WIF_SET}" == "true" && "${KEY_SET}" == "true" ]]; then
            echo "Both WIF and GCP_CREDENTIALS_JSON are configured. Configure exactly one."
            exit 1
          fi

          if [[ "${WIF_SET}" != "true" && "${KEY_SET}" != "true" ]]; then
            echo "No Google auth configured. Set WIF_PROVIDER + WIF_SERVICE_ACCOUNT (vars or secrets), or GCP_CREDENTIALS_JSON secret."
            exit 1
          fi

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push Docker image
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_URI="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/${SERVICE}:${SHORT_SHA}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "${GITHUB_ENV}"
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="project_id=${PROJECT_ID}" \
            -var="region=${REGION}" \
            -var="image=${IMAGE_URI}"
