name: Deploy to test (Macbook Docker)

on:
  push:
    branches: [test]

jobs:
  deploy:
    runs-on: [self-hosted, mac-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t dotnet:test .

      - name: Stop/remove old container (if any)
        run: |
          docker rm -f dotnet-test || true
          docker ps -q --filter publish=8080 | xargs -r docker rm -f || true

      - name: Run new container
        run: |
          docker run -d \
            --name dotnet-test \
            -p 8080:8080 \
            --restart unless-stopped \
            dotnet:test

      - name: Smoke test
        run: |
          for i in {1..30}; do
            if curl -fsS http://host.docker.internal:8080/health >/dev/null; then
              echo "OK"
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed"
          docker logs dotnet-test || true
          exit 1

      - name: Cleanup
        if: always()
        run: |
          docker rm -f dotnet-test || true
