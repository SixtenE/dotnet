substitutions:
  _REGION: europe-north1
  _AR_REPO: my-docker-repo
  _SERVICE_NAME: myapi-prod

steps:
  - name: mcr.microsoft.com/dotnet/sdk:10.0
    entrypoint: dotnet
    args:
      [
        "test",
        "DotNet8.ScalarWebApi.Tests/DotNet8.ScalarWebApi.Tests.csproj",
        "--configuration",
        "Release",
        "--logger",
        "console;verbosity=normal",
      ]

  - name: gcr.io/cloud-builders/docker
    args:
      [
        "build",
        "-t",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/myapi:$COMMIT_SHA",
        "-t",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/myapi:latest",
        ".",
      ]

  - name: gcr.io/cloud-builders/docker
    args:
      [
        "push",
        "--all-tags",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/myapi",
      ]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "${_SERVICE_NAME}",
        "--image",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/myapi:$COMMIT_SHA",
        "--region",
        "${_REGION}",
        "--platform",
        "managed",
        "--quiet",
      ]

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/myapi:$COMMIT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/myapi:latest"
